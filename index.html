<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arun Thumbnail Designer | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        bg: {
                            dark: '#0B0B0F',
                            card: '#15161A',
                        },
                        accent: {
                            purple: '#7B61FF',
                            blue: '#3DA9FC',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0B0B0F;
            color: #F5F5F7;
        }
        .text-gradient {
            background: linear-gradient(to right, #7B61FF, #3DA9FC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(21, 22, 26, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .btn-primary {
            background-color: #7B61FF;
            box-shadow: 0 10px 15px -3px rgba(123, 97, 255, 0.2);
        }
        .btn-primary:hover {
            background-color: rgba(123, 97, 255, 0.9);
            box-shadow: 0 20px 25px -5px rgba(123, 97, 255, 0.4);
        }
    </style>
</head>
<body class="font-sans antialiased overflow-x-hidden">

    <nav id="navbar" class="fixed top-0 left-0 w-full z-50 transition-all duration-500 py-6">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
            <a href="#home" class="flex items-center gap-2 group">
                <div class="w-10 h-10 bg-accent-purple rounded-lg flex items-center justify-center group-hover:rotate-12 transition-transform duration-300">
                    <i data-lucide="film" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-xl font-display font-bold tracking-tighter uppercase">ARUN<span class="text-accent-purple">DESIGN</span></span>
            </a>
            <div class="hidden md:flex items-center gap-8">
                <a href="#home" class="text-sm font-medium text-gray-400 hover:text-white transition-colors">Home</a>
                <a href="#about" class="text-sm font-medium text-gray-400 hover:text-white transition-colors">About</a>
                <a href="#work" class="text-sm font-medium text-gray-400 hover:text-white transition-colors">Work</a>
                <a href="#contact" class="text-sm font-medium text-gray-400 hover:text-white transition-colors">Contact</a>
                <a href="#contact" class="btn-primary py-2 px-6 text-sm rounded-full font-medium transition-all">Hire Me</a>
            </div>
            <button id="menu-toggle" class="md:hidden text-white p-2">
                <i data-lucide="menu" id="menu-icon"></i>
            </button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-bg-card border-b border-white/5 overflow-hidden">
            <div class="flex flex-col p-6 gap-4">
                <a href="#home" class="mobile-link text-lg font-medium text-gray-400 hover:text-white">Home</a>
                <a href="#about" class="mobile-link text-lg font-medium text-gray-400 hover:text-white">About</a>
                <a href="#work" class="mobile-link text-lg font-medium text-gray-400 hover:text-white">Work</a>
                <a href="#contact" class="mobile-link text-lg font-medium text-gray-400 hover:text-white">Contact</a>
                <a href="#contact" class="btn-primary text-center mt-2 py-3 rounded-full">Hire Me</a>
            </div>
        </div>
    </nav>

    <section id="home" class="relative h-screen w-full flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <div class="absolute inset-0 bg-gradient-to-b from-bg-dark/40 via-bg-dark/60 to-bg-dark z-10"></div>
            <img src="Hero.png" alt="Hero Background" class="w-full h-full object-cover scale-105 opacity-60">
        </div>
        <div class="relative z-20 max-w-7xl mx-auto px-6 text-center" data-aos="fade-up">
            <span class="inline-block px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-accent-blue text-xs font-bold uppercase mb-6">Expert Thumbnail Designer</span>
            <h1 class="text-5xl md:text-8xl font-display font-bold tracking-tighter mb-8">ARUN <span class="text-gradient">THUMBNAIL</span> DESIGNER</h1>
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="#work" class="btn-primary px-8 py-4 rounded-full font-medium">View Work</a>
                <a href="#contact" class="px-8 py-4 border border-white/20 text-white rounded-full font-medium">Let's Talk</a>
            </div>
        </div>
    </section>

    <section id="work" class="py-24 bg-bg-dark">
        <div class="max-w-7xl mx-auto px-6">
            <div class="mb-16">
                <span class="text-accent-blue font-bold tracking-widest uppercase text-xs mb-4 block">Portfolio</span>
                <h2 class="text-4xl md:text-5xl font-display font-bold uppercase">SELECTED <span class="text-gradient">WORKS</span></h2>
            </div>
            <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                </div>
        </div>
    </section>

    <script>
        lucide.createIcons();
        AOS.init({ once: true, duration: 800 });

        const projectsGrid = document.getElementById('projects-grid');
        const totalProjects = 9;

        for (let i = 1; i <= totalProjects; i++) {
            // हम सभी इमेजेस लोड करने की कोशिश करेंगे
            const projectCard = `
                <div id="project-card-${i}" class="group" data-aos="fade-up">
                    <div class="relative rounded-lg shadow-xl bg-bg-card overflow-visible">
                        <img src="thumbnail${i}.png" 
                             alt="Project ${i}" 
                             class="w-full h-auto rounded-lg transition-transform duration-500 group-hover:scale-[1.02]"
                             onerror="document.getElementById('project-card-${i}').style.display='none';">
                        <div class="mt-4 px-2">
                            <span class="text-accent-blue text-[10px] font-bold uppercase block mb-1">YouTube Design</span>
                            <h3 class="text-lg font-display font-bold text-white uppercase">Project ${i}</h3>
                        </div>
                    </div>
                </div>
            `;
            projectsGrid.innerHTML += projectCard;
        }

        // मोबाइल मेनू और स्क्रॉल लॉजिक (पुराना वाला)
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        menuToggle.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
